<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathBot AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>
        <h1>🧮 MathBot AI</h1>
        <p>Offline AI Math Tutor using Ollama</p>
    </header>

    <div id="chat-box">

        <div class="bot-message">
            Hello! 👋 Ask me any math question.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="message"
            placeholder="Type your question..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
